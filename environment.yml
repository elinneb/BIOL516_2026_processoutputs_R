name: BIOL516 SingleM Analyses
channels:
  - conda-forge
  - bioconda
channel_priority: strict
dependencies:
  # --- pin Python to what Binder already uses, helps the solver
  - python=3.10

  # --- R stack (minimal; no r-essentials)
  - r-base=4.3
  - r-irkernel
  - r-essentials
  - r-tidyverse
  - rstudio-desktop
  - jupyter-rsession-proxy
  - r-vegan
  - r-zCompositions
  - bioconductor-phyloseq
  - bioconductor-rhdf5
  - r-ggforce
  - r-cowplot
  - r-rcolorbrewer
